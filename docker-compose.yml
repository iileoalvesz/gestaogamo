services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestaogamon_backend
    restart: unless-stopped
    environment:
      - DB_PATH=/data/db.sqlite3
      - STATIC_ROOT=/app/staticfiles
      - MEDIA_ROOT=/app/media
      - SECRET_KEY=gamon-secret-key-mude-antes-de-producao-real-2024
      - DEBUG=False
      - ALLOWED_HOSTS=31.97.241.49,localhost
      - CORS_ALLOWED_ORIGINS=http://31.97.241.49:8023
      - CSRF_TRUSTED_ORIGINS=http://31.97.241.49:8023
      - DJANGO_SUPERUSER_USERNAME=admin
      - DJANGO_SUPERUSER_EMAIL=admin@gamon.com
      - DJANGO_SUPERUSER_PASSWORD=Gamon@2024
    volumes:
      - sqlite_data:/data
      - media_data:/app/media
      - static_data:/app/staticfiles
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gestaogamon_frontend
    restart: unless-stopped
    ports:
      - "8023:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
  media_data:
  static_data:
