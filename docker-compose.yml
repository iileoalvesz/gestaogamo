services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestaogamon_backend
    volumes:
      - sqlite_data:/data
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    environment:
      - DB_PATH=/data/db.sqlite3
      - STATIC_ROOT=/app/staticfiles
      - MEDIA_ROOT=/app/media
      - SECRET_KEY=gamon-secret-key-mude-antes-de-producao-real-2024
      - DEBUG=False
      - ALLOWED_HOSTS=31.97.241.49,localhost
      - CORS_ALLOWED_ORIGINS=http://31.97.241.49:8025
      - CSRF_TRUSTED_ORIGINS=http://31.97.241.49:8025
      - DJANGO_SUPERUSER_USERNAME=admin
      - DJANGO_SUPERUSER_EMAIL=admin@gamon.com
      - DJANGO_SUPERUSER_PASSWORD=Gamon@2024
    networks:
      - gestaogamon_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gestaogamon_frontend_build
    volumes:
      - frontend_build:/usr/share/nginx/html
    command: /bin/true
    restart: "no"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: gestaogamon_nginx
    ports:
      - "8025:80"
    volumes:
      - frontend_build:/usr/share/nginx/html:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend
      - frontend
    networks:
      - gestaogamon_network
    restart: unless-stopped

volumes:
  sqlite_data:
  static_volume:
  media_volume:
  frontend_build:

networks:
  gestaogamon_network:
    driver: bridge
