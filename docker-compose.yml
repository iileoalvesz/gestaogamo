services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_PATH: /data/db.sqlite3
      STATIC_ROOT: /app/staticfiles
      MEDIA_ROOT: /app/media
      SECRET_KEY: "gamon-secret-key-mude-antes-de-producao-real-2024"
      DEBUG: "False"
      ALLOWED_HOSTS: "31.97.241.49,localhost"
      CORS_ALLOWED_ORIGINS: "http://31.97.241.49:3000"
    volumes:
      - sqlite_data:/data
      - media_data:/app/media
      - static_data:/app/staticfiles
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/auth/token/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
  media_data:
  static_data:
